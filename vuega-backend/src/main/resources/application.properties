spring.application.name=vuega-backend   
# ===============================
# = DATA SOURCE
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/operatorss
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# = JPA / HIBERNATE
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = HIKARI CONNECTION POOL
# ===============================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===============================
# = CONTROL PLANE (external API)
# ===============================
control-panel.base-url=http://localhost:3000

# ===============================
# = REDIS CACHE
# ===============================
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=2000

# Cache refresh interval in milliseconds (default 5 minutes)
cache.refresh.interval=300000


